<!DOCTYPE html>
<html>
<head>
  <title>Purified</title>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <style>
  body {
    color: white;
    font-family: 'Ubuntu', sans-serif;
    text-align: center;
    padding-top: 30px;
    margin: 0;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
      url("robloxbackground.jpeg");
    background-size: cover;
    background-position: center;
    filter: blur(6px);
    transform: scale(1.05);
    z-index: -1;
  }

  img {
    width: 150px;
    height: 150px;
  }

  a {
    color: rgb(90, 150, 255);
    font-family: 'Ubuntu', sans-serif;
  }

  h1 {
    font-family: 'Ubuntu', sans-serif;
  }
</style>
</head>
<body>
  <img src="purified.png" alt="Purified Logo">

  <h1>Purified</h1>

  <p>
    Roblox runtime for ARM64 Linux.
  </p>

  <p>
    Experimental. Not affiliated with Roblox Corporation.
  </p>

<h3>current experiment website for the purified project.</h3>

  
  <a href="https://github.com/awesomefroggy29/purified">
    GitHub Repository
  </a>
</body>
</html>
